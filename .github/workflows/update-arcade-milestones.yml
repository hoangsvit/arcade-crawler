name: Update Arcade milestones

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths-ignore:
      - "data/arcade_milestones.json"

  schedule:
    - cron: '0 */6 * * *'
      timezone: "Asia/Ho_Chi_Minh"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_REMOTE_CONFIG_KEY: arcade_milestones
      PUBLISH_REMOTE_CONFIG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Crawl and publish Remote Config
        run: npm start

      - name: Update README last run time
        run: |
          python3 - <<'EOF'
          import re, pathlib, subprocess, os
          last_run = subprocess.check_output(
              ["date", "+%d/%m/%Y %H:%M:%S (GMT+7)"],
              env={**os.environ, "TZ": "Asia/Ho_Chi_Minh"}
          ).decode().strip()
          path = pathlib.Path("README.md")
          content = re.sub(
              r"<!-- LAST_RUN_START -->.*?<!-- LAST_RUN_END -->",
              f"<!-- LAST_RUN_START -->\n{last_run}\n<!-- LAST_RUN_END -->",
              path.read_text(),
              flags=re.DOTALL,
          )
          path.write_text(content)
          EOF

      - name: Commit crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATA_CHANGED=false
          README_CHANGED=false
          git diff --quiet -- data/arcade_milestones.json || DATA_CHANGED=true
          git diff --quiet -- README.md || README_CHANGED=true

          if [ "$DATA_CHANGED" = "false" ] && [ "$README_CHANGED" = "false" ]; then
            echo "Nothing changed; commit skipped."
            exit 0
          fi

          [ "$DATA_CHANGED" = "true" ] && git add data/arcade_milestones.json
          [ "$README_CHANGED" = "true" ] && git add README.md

          if [ "$DATA_CHANGED" = "true" ]; then
            git commit -m "chore: update Arcade milestones"
          else
            git commit -m "chore: update last run time"
          fi
          git push

      - name: Upload crawler diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: arcade-crawler-diagnostics
          path: storage/
          if-no-files-found: ignore
          retention-days: 7
