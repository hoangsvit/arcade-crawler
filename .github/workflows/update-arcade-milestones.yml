name: Update Arcade milestones

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths-ignore:
      - "data/arcade_milestones.json"

  schedule:
    # 01:00 UTC = 08:00 sáng Việt Nam
    # - cron: "0 1 * * *"
    - cron: '0 8,13,18,21 * * *'
      timezone: "Asia/Ho_Chi_Minh"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_REMOTE_CONFIG_KEY: arcade_milestones
      PUBLISH_REMOTE_CONFIG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Crawl and publish Remote Config
        run: npm start

      - name: Commit crawled data
        run: |
          if git diff --quiet -- data/arcade_milestones.json; then
            echo "Arcade data unchanged; commit skipped."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arcade_milestones.json
          git commit -m "chore: update Arcade milestones"
          git push

      - name: Upload crawler diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: arcade-crawler-diagnostics
          path: storage/
          if-no-files-found: ignore
          retention-days: 7
